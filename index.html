<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minnesota Election Results</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #7d8590;
      --r: #e05c5c;
      --r-dim: #3a1a1a;
      --dfl: #4a90d9;
      --dfl-dim: #0e2040;
      --other: #9b8fcf;
      --other-dim: #1e1a30;
      --green: #3fb950;
      --accent: #f0b429;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      padding: 24px 16px 48px;
      min-height: 100vh;
    }

    header {
      max-width: 860px;
      margin: 0 auto 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    header .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    header .meta { color: var(--muted); font-size: 12px; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

    #status-bar {
      max-width: 860px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      flex-wrap: wrap;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #refresh-btn:hover { color: var(--text); border-color: var(--muted); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    #countdown-wrap { display: flex; align-items: center; gap: 6px; }
    #countdown-ring { width: 16px; height: 16px; transform: rotate(-90deg); }
    #countdown-ring circle { fill: none; stroke-width: 2; }
    #ring-bg   { stroke: var(--border); }
    #ring-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    @keyframes spin { to { transform: rotate(270deg); } }
    .fetching #ring-fill { animation: spin 0.8s linear infinite; transform-origin: 50% 50%; }

    .races { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

    .race-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .race-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .race-title { font-weight: 600; font-size: 14px; }

    .race-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }

    .candidates { padding: 8px 0; }

    .candidate-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
    }

    .party-badge {
      width: 36px;
      min-width: 36px;
      font-size: 9px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 3px;
      text-align: center;
    }
    .party-badge.R     { color: var(--r);     background: var(--r-dim); }
    .party-badge.DFL   { color: var(--dfl);   background: var(--dfl-dim); }
    .party-badge.other { color: var(--other); background: var(--other-dim); }

    .candidate-name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .candidate-name.winner { color: var(--green); font-weight: 600; }
    .winner-star { color: var(--green); font-size: 11px; margin-right: 4px; }

    .bar-wrap {
      width: 120px;
      min-width: 60px;
      background: #21262d;
      border-radius: 3px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .bar-fill.R     { background: var(--r); }
    .bar-fill.DFL   { background: var(--dfl); }
    .bar-fill.other { background: var(--other); }

    .candidate-pct {
      width: 46px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }
    .candidate-votes {
      width: 76px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .divider { height: 1px; background: var(--border); margin: 4px 16px; }

    .error-card {
      background: var(--r-dim);
      border: 1px solid var(--r);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--r);
    }
    .error-card .race-label { font-weight: 600; margin-bottom: 4px; }

    @media (max-width: 520px) {
      .bar-wrap { width: 70px; }
      .candidate-votes { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Minnesota</div>
  <h1>Election Results</h1>
  <div class="meta">State General Election · November 8, 2022</div>
</header>

<div id="status-bar">
  <span id="status-text">Loading results…</span>
  <div id="countdown-wrap">
    <svg id="countdown-ring" viewBox="0 0 16 16">
      <circle id="ring-bg" cx="8" cy="8" r="6" />
      <circle id="ring-fill" cx="8" cy="8" r="6" stroke-dasharray="37.7" stroke-dashoffset="0" />
    </svg>
    <span id="countdown-label"></span>
  </div>
  <button id="refresh-btn" onclick="manualRefresh()">↺ Refresh now</button>
</div>

<div class="races" id="races"></div>

<script>
  // ═══════════════════════════════════════════════════════
  // CONFIG — edit this section to add/remove races
  // ═══════════════════════════════════════════════════════

  const WORKER_URL = 'https://mn-election-proxy.daenzermissionsandmedia.workers.dev';

  // Base election ID — change this for a different election
  const ELECTION_ID = 149; // 149 = 2022 General Election

  // Races to display. Each entry needs a label and a url.
  // Build URLs from: https://electionresults.sos.mn.gov/{ELECTION_ID}
  const RACES = [
    {
      label: 'Governor & Lt. Governor',
      url: `https://electionresults.sos.mn.gov/Results/Index?ersElectionId=${ELECTION_ID}&scenario=Governor&officeInElectionId=27938`,
    },
    {
      label: 'Attorney General',
      url: `https://electionresults.sos.mn.gov/Results/Index?ersElectionId=${ELECTION_ID}&scenario=AttorneyGeneral&officeInElectionId=27941`,
    },
    {
      label: 'Secretary of State',
      url: `https://electionresults.sos.mn.gov/Results/Index?ersElectionId=${ELECTION_ID}&scenario=SecretaryOfState&officeInElectionId=27939`,
    },
    {
      label: 'State Auditor',
      url: `https://electionresults.sos.mn.gov/Results/Index?ersElectionId=${ELECTION_ID}&scenario=StateAuditor&officeInElectionId=27940`,
    },
    {
      label: 'U.S. House — All Districts',
      url: `https://electionresults.sos.mn.gov/Results/Index?ersElectionId=${ELECTION_ID}&scenario=USRepresentative`,
    },
  ];

  // Auto-refresh interval in seconds
  const REFRESH_INTERVAL = 5 * 60;

  // ═══════════════════════════════════════════════════════
  // Runtime — no need to edit below this line
  // ═══════════════════════════════════════════════════════

  const CIRC = 2 * Math.PI * 6;
  const PARTY_ORDER = ['R', 'DFL'];

  let secondsLeft = REFRESH_INTERVAL;
  let countdownTimer = null;

  const ringFill   = document.getElementById('ring-fill');
  const countLabel = document.getElementById('countdown-label');

  function partyClass(abbr) {
    if (abbr === 'R')   return 'R';
    if (abbr === 'DFL') return 'DFL';
    return 'other';
  }

  function fmt(n) { return Number(n).toLocaleString(); }

  function setStatus(msg, isError) {
    const el = document.getElementById('status-text');
    el.textContent = msg;
    el.style.color = isError ? 'var(--r)' : '';
  }

  function setLoading(on) {
    document.getElementById('refresh-btn').disabled = on;
    document.getElementById('countdown-ring').classList.toggle('fetching', on);
  }

  function updateRing(secs) {
    const offset = CIRC * (1 - secs / REFRESH_INTERVAL);
    ringFill.style.strokeDashoffset = offset;
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    countLabel.textContent = m > 0 ? `${m}m ${String(s).padStart(2,'0')}s` : `${s}s`;
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    secondsLeft = REFRESH_INTERVAL;
    updateRing(secondsLeft);
    countdownTimer = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(countdownTimer);
        loadResults();
      } else {
        updateRing(secondsLeft);
      }
    }, 1000);
  }

  function manualRefresh() {
    clearInterval(countdownTimer);
    loadResults();
  }

  // Fetch one race via the worker
  async function fetchRace(race) {
    const proxyUrl = `${WORKER_URL}?url=${encodeURIComponent(race.url)}`;
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  }

  // Render a single race card
  function renderCard(race, data) {
    const card = document.createElement('div');
    card.className = 'race-card';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'race-header';

    const titleEl = document.createElement('span');
    titleEl.className = 'race-title';
    titleEl.textContent = race.label;

    const metaEl = document.createElement('span');
    metaEl.className = 'race-meta';
    metaEl.textContent = data.precincts.total > 0
      ? `${fmt(data.precincts.reporting)}/${fmt(data.precincts.total)} precincts (${data.precincts.pct}%)`
      : '';

    hdr.append(titleEl, metaEl);
    card.appendChild(hdr);

    // Candidates — sort by party order first, then votes
    const sorted = [...data.candidates].sort((a, b) => {
      const ai = PARTY_ORDER.indexOf(a.partyAbbr);
      const bi = PARTY_ORDER.indexOf(b.partyAbbr);
      if (ai !== bi) {
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      }
      return b.votes - a.votes;
    });

    // Find winner (highest votes overall)
    const winner = data.candidates[0];

    const candidatesEl = document.createElement('div');
    candidatesEl.className = 'candidates';

    sorted.forEach((c, i) => {
      // Divider between parties
      if (i > 0 && sorted[i].partyAbbr !== sorted[i-1].partyAbbr) {
        candidatesEl.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
      }

      const isWinner = c === winner;
      const pc = partyClass(c.partyAbbr);
      const row = document.createElement('div');
      row.className = 'candidate-row';

      const badge = document.createElement('span');
      badge.className = `party-badge ${pc}`;
      badge.textContent = c.partyAbbr;

      const nameEl = document.createElement('div');
      nameEl.className = `candidate-name${isWinner ? ' winner' : ''}`;
      nameEl.innerHTML = isWinner
        ? `<span class="winner-star">★</span>${c.name}`
        : c.name;

      const barWrap = document.createElement('div');
      barWrap.className = 'bar-wrap';
      const barFill = document.createElement('div');
      barFill.className = `bar-fill ${pc}`;
      barFill.style.width = `${c.pct}%`;
      barWrap.appendChild(barFill);

      const pctEl = document.createElement('div');
      pctEl.className = 'candidate-pct';
      pctEl.textContent = `${c.pct.toFixed(1)}%`;

      const votesEl = document.createElement('div');
      votesEl.className = 'candidate-votes';
      votesEl.textContent = fmt(c.votes);

      row.append(badge, nameEl, barWrap, pctEl, votesEl);
      candidatesEl.appendChild(row);
    });

    card.appendChild(candidatesEl);
    return card;
  }

  // Render an error card
  function renderError(race, message) {
    const card = document.createElement('div');
    card.className = 'error-card';
    card.innerHTML = `<div class="race-label">${race.label}</div><div>${message}</div>`;
    return card;
  }

  // Load all races in parallel
  async function loadResults() {
    setLoading(true);
    setStatus('Fetching results…');

    const racesEl = document.getElementById('races');
    racesEl.innerHTML = '';

    const results = await Promise.allSettled(RACES.map(fetchRace));

    let successCount = 0;
    results.forEach((result, i) => {
      if (result.status === 'fulfilled' && result.value.candidates?.length) {
        racesEl.appendChild(renderCard(RACES[i], result.value));
        successCount++;
      } else {
        const msg = result.reason?.message || 'No data returned';
        racesEl.appendChild(renderError(RACES[i], msg));
      }
    });

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    setStatus(`${successCount}/${RACES.length} races loaded · ${now}`, successCount === 0);

    setLoading(false);
    startCountdown();
  }

  loadResults();
</script>
</body>
</html>
