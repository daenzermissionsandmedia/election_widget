
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN Election Results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Roboto:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .kr-wrap {
    font-family: 'Roboto', arial, sans-serif;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    overflow: hidden;
    width: 100%;
  }

  /* Top label bar */
  .kr-race-label {
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    padding: 8px 14px;
    font-family: 'Roboto Condensed', arial, sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .kr-pct-in {
    font-size: 18px;
    color: #E10500;
    font-weight: 700;
  }

  /* Two-column body */
  .kr-body {
    display: flex;
    align-items: stretch;
  }

  /* Each candidate column */
  .kr-candidate {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
    position: relative;
    min-width: 0;
  }

  .kr-candidate.dfl-side {
    background: #0a0e1a;
    border-right: 2px solid #333;
  }
  .kr-candidate.r-side {
    background: #160a0a;
  }

  /* Party header strip inside each column */
  .kr-party-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Roboto Condensed', arial, sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-bottom: 1px solid;
  }
  .dfl-side .kr-party-header {
    color: #a0c8ff;
    border-color: #1a3060;
    background: #060a14;
  }
  .r-side .kr-party-header {
    color: #FF3333;
    border-color: #601a1a;
    background: #100606;
  }
  .kr-leaders-tag {
    font-size: 16px;
    letter-spacing: 0.14em;
    opacity: 0.85;
    font-weight: 700;
    text-transform: uppercase;
  }
  .kr-votes-in {
    font-size: 14px;
    letter-spacing: 0.04em;
    opacity: 0.75;
    font-weight: 700;
    text-transform: uppercase;
  }

  /* Horizontal row: photo + info side by side */
  .kr-cand-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    flex: 1;
    min-width: 0;
  }

  /* Avatar */
  .kr-avatar {
    width: 100px;
    min-width: 100px;
    height: 114px;
    background: #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .dfl-side .kr-avatar { border: 2px solid #1e3a7a; }
  .r-side .kr-avatar  { border: 2px solid #7a1e1e; }

  .kr-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  /* Generic silhouette */
  .kr-avatar-head {
    width: 38px; height: 38px; border-radius: 50%;
    background: #555;
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  }
  .kr-avatar-body {
    width: 82px; height: 56px;
    background: #444;
    border-radius: 41px 41px 0 0;
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  }

  /* Info block to right of photo */
  .kr-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    min-width: 0;
    flex: 1;
  }

  /* Name — first and last as separate spans */
  .kr-name {
    font-family: 'Roboto Condensed', arial, sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: #fff;
    line-height: 1.15;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .kr-firstname { }
  .kr-lastname  { }

  /* Big percentage */
  .kr-pct {
    font-family: 'Roboto Condensed', arial, sans-serif;
    font-weight: 700;
    font-size: 72px;
    line-height: 1;
  }
  .dfl-side .kr-pct { color: #a0c8ff; }
  .r-side .kr-pct  { color: #FF3333; }

  /* Nav bar */
  .kr-nav {
    background: #1a1a1a;
    border-top: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    gap: 8px;
  }
  .kr-nav-btn {
    background: #4a4a4a;
    border: none;
    color: #fff;
    font-family: 'Roboto Condensed', arial, sans-serif;
    font-weight: 700;
    font-size: 18px;
    padding: 6px 18px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .kr-nav-btn:hover { background: #fff; color: #111; }
  .kr-nav-center { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; min-width: 0; }
  .kr-updated { font-size: 16px; color: #999; text-align: center; white-space: nowrap; }
  .kr-all-btn {
    background: none;
    border: 1px solid #777;
    color: #ddd;
    font-family: 'Roboto Condensed', arial, sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .kr-all-btn:hover { background: #fff; color: #111; border-color: #fff; }

  /* Panel transitions */
  .kr-stage { position: relative; }
  .kr-panel { transition: opacity 0.6s ease; }
  .kr-panel.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
    top: 0; left: 0; width: 100%;
  }
  .kr-panel.visible { opacity: 1; }

  /* ── Progressive hiding by widget width ─────────────────────────────────── */

  /* size-md: ~360–479px — hide votes-in from party header */
  .kr-wrap.size-md .kr-votes-in { display: none; }

  /* size-sm: < 360px — also hide first name */
  .kr-wrap.size-sm .kr-votes-in { display: none; }
  .kr-wrap.size-sm .kr-firstname { display: none; }
</style>
</head>
<body>

<div class="kr-wrap" role="region" aria-label="MN Primary Election Results">
  <div class="kr-stage" id="kr-stage"></div>
  <div class="kr-nav">
    <button class="kr-nav-btn" onclick="krGo(-1)">&#8592; Prev</button>
    <div class="kr-nav-center">
      <span class="kr-updated">Updated: <span id="kr-time"></span></span>
      <button class="kr-all-btn" onclick="window.open('https://www.wcco.com/results', '_blank')">See All Results</button>
    </div>
    <button class="kr-nav-btn" onclick="krGo(1)">Next &#8594;</button>
  </div>
</div>

// ── Parse ─────────────────────────────────────────────────────────────────────
// ── Race configuration ────────────────────────────────────────────────────────
// race_title values come from the <packet><race_title> element in the live feed.
// Update these strings when switching to Governor/Senate for the real election.
// Panel display title is what viewers see; dflLabel is the left-column party name.
const RACES = [
  {
    panelTitle: 'U.S. House District 1',
    dflTitle:   'LS-U.S. Representative District 1 - D',
    rTitle:     'LS-U.S. Representative District 1 - R',
    dflLabel:   'Democrat',
  },
  {
    panelTitle: 'U.S. House District 2',
    dflTitle:   'LS-U.S. Representative District 2 - D',
    rTitle:     'LS-U.S. Representative District 2 - R',
    dflLabel:   'Democrat',
  },
  // ── Swap these in for the real election: ──────────────────────────────────
  // { panelTitle: 'Governor',    dflTitle: 'Governor - DFL', rTitle: 'Governor - R',       dflLabel: 'DFL'      },
  // { panelTitle: 'U.S. Senate', dflTitle: 'U.S. Senator - D', rTitle: 'U.S. Senator - R', dflLabel: 'Democrat' },
];

// ── Parse CBS LiveSync <data>/<packet> XML format ─────────────────────────────
function parseXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');

  // Map: race_title → { precRep, precTot, candidates[] }
  const raceMap = {};

  doc.querySelectorAll('packet').forEach(packet => {
    const title   = (packet.querySelector('race_title') || {}).textContent || '';
    const precRep = parseInt((packet.querySelector('pcts_reporting') || {}).textContent) || 0;
    const precTot = parseInt((packet.querySelector('pcts_total')     || {}).textContent) || 1;

    if (!title) return;

    // Use first occurrence of each race_title (feed sometimes duplicates packets)
    if (!raceMap[title]) {
      raceMap[title] = { precRep, precTot, candidates: [] };
    }

    packet.querySelectorAll('candidate').forEach(c => {
      const name  = (c.querySelector('name')  || {}).textContent || '';
      const votes = parseInt((c.querySelector('votes') || {}).textContent) || 0;
      const party = ((c.querySelector('party') || {}).textContent || '').trim().toUpperCase();
      if (!name) return;
      raceMap[title].candidates.push({ name: name.trim(), votes, party });
    });
  });

  return raceMap;
}

// ── Get leader for a race+party from raceMap ──────────────────────────────────
function getLeaderFromMap(raceMap, raceTitle, party) {
  const race = raceMap[raceTitle];
  if (!race) return null;

  const pool = race.candidates.filter(c => c.party === party);
  if (!pool.length) return null;

  pool.sort((a, b) => b.votes - a.votes);
  const top = pool[0];

  // Calculate pct from all candidates in that race (party-specific total)
  const partyTotal = pool.reduce((sum, c) => sum + c.votes, 0);
  const pct = partyTotal > 0 ? (top.votes / partyTotal) * 100 : 0;

  return {
    candName: top.name,
    votes:    top.votes,
    pct,
    precRep:  race.precRep,
    precTot:  race.precTot,
    party,
  };
}

// ── Split name into first / last ──────────────────────────────────────────────
function splitName(fullName) {
  // Strip trailing ", R" or ", DFL" party suffixes that appear in some name fields
  const clean = fullName.replace(/,\s*(R|DFL|D|REP|DEM)$/i, '').trim();
  const primary = clean.split(' and ')[0].trim();
  const parts = primary.split(' ');
  if (parts.length === 1) return { first: '', last: parts[0] };
  return { first: parts.slice(0, -1).join(' '), last: parts[parts.length - 1] };
}

// ── Build candidate half-panel ────────────────────────────────────────────────
function buildSide(leader, partyLabel, sideClass, precinctStr) {
  if (!leader) return (
    '<div class="kr-candidate ' + sideClass + '">' +
      '<div class="kr-party-header">' +
        '<span>' + partyLabel + '</span>' +
        '<span class="kr-leaders-tag">&#9670; LEADER</span>' +
      '</div>' +
      '<div class="kr-cand-row">' +
        '<div class="kr-info"><div class="kr-name">No data</div></div>' +
      '</div>' +
    '</div>'
  );

  const photo = PHOTOS[leader.candName] || null;
  const avatarInner = photo
    ? '<img src="' + photo + '" alt="' + leader.candName + '" />'
    : '<div class="kr-avatar-head"></div><div class="kr-avatar-body"></div>';

  const precStr = precinctStr ? '<span class="kr-votes-in">' + precinctStr + '</span>' : '';
  const { first, last } = splitName(leader.candName);
  const nameHtml = first
    ? '<span class="kr-firstname">' + first + ' </span><span class="kr-lastname">' + last + '</span>'
    : '<span class="kr-lastname">' + last + '</span>';

  return (
    '<div class="kr-candidate ' + sideClass + '">' +
      '<div class="kr-party-header">' +
        '<span>' + partyLabel + '</span>' +
        '<span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">' +
          '<span class="kr-leaders-tag">&#9670; LEADER</span>' +
          precStr +
        '</span>' +
      '</div>' +
      '<div class="kr-cand-row">' +
        '<div class="kr-avatar">' + avatarInner + '</div>' +
        '<div class="kr-info">' +
          '<div class="kr-name">' + nameHtml + '</div>' +
          '<div class="kr-pct">' + leader.pct.toFixed(1) + '%</div>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

// ── Build a full two-up panel ─────────────────────────────────────────────────
function buildPanel(title, dflLeader, rLeader, dflLabel, dflPrec, rPrec) {
  const div = document.createElement('div');
  div.className = 'kr-panel hidden';
  div.innerHTML =
    '<div class="kr-race-label">' +
      '<span>' + title + ' — PRIMARY</span>' +
    '</div>' +
    '<div class="kr-body">' +
      buildSide(dflLeader, dflLabel, 'dfl-side', dflPrec) +
      buildSide(rLeader, 'Republican', 'r-side', rPrec) +
    '</div>';
  return div;
}

// ── Render panels from raceMap ────────────────────────────────────────────────
function renderPanels(raceMap) {
  const stage = document.getElementById('kr-stage');
  stage.innerHTML = '';

  panels = RACES.map(race => {
    const dfl = getLeaderFromMap(raceMap, race.dflTitle, 'DFL');
    const r   = getLeaderFromMap(raceMap, race.rTitle,   'R');
    const dflPrec = dfl ? Math.round((dfl.precRep / dfl.precTot) * 100) + '% votes in' : '';
    const rPrec   = r   ? Math.round((r.precRep   / r.precTot)   * 100) + '% votes in' : '';
    return buildPanel(race.panelTitle, dfl, r, race.dflLabel, dflPrec, rPrec);
  });

  panels.forEach(p => stage.appendChild(p));
  showPanel(current < panels.length ? current : 0);
  document.getElementById('kr-time').textContent =
    new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Fetch live data ───────────────────────────────────────────────────────────
async function fetchAndRender() {
  try {
    const res = await fetch(FEED_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    console.log('Feed response length:', text.length);
    console.log('Feed preview:', text.substring(0, 500));
    const raceMap = parseXML(text);
    console.log('Parsed race titles:', Object.keys(raceMap));
    if (!raceMap || !Object.keys(raceMap).length) throw new Error('Empty result');
    renderPanels(raceMap);
  } catch (err) {
    console.warn('Live feed error:', err);
  }
}

// ── State & controls ──────────────────────────────────────────────────────────
let panels = [], current = 0, advanceTimer = null, refreshTimer = null;

function showPanel(idx) {
  panels.forEach((p, i) => {
    p.classList.toggle('hidden', i !== idx);
    p.classList.toggle('visible', i === idx);
  });
  current = idx;
}

function scheduleAdvance() {
  clearTimeout(advanceTimer);
  advanceTimer = setTimeout(() => {
    showPanel((current + 1) % panels.length);
    scheduleAdvance();
  }, ADVANCE_MS);
}

function krGo(dir) {
  showPanel((current + dir + panels.length) % panels.length);
  scheduleAdvance();
}

function scheduleRefresh() {
  refreshTimer = setTimeout(async () => {
    await fetchAndRender();
    scheduleRefresh();
  }, REFRESH_MS);
}

async function init() {
  await fetchAndRender();
  scheduleAdvance();
  scheduleRefresh();

  const wrap = document.querySelector('.kr-wrap');
  const sizer = new ResizeObserver(entries => {
    const w = entries[0].contentRect.width;
    wrap.classList.remove('size-md', 'size-sm');
    if (w < 360)      wrap.classList.add('size-sm');
    else if (w < 480) wrap.classList.add('size-md');
  });
  sizer.observe(wrap);
}

init();
</script>
